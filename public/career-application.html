<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Career Application Form</title>
  </head>
  <body>
    <form
      name="career-application"
      method="POST"
      data-netlify="true"
      enctype="multipart/form-data"
      hidden
    >
      <input type="hidden" name="form-name" value="career-application" />
      <input name="roleTitle" />
      <input name="roleSlug" />
      <input name="roleReference" />
      <input name="fullName" />
      <input type="email" name="email" />
      <input name="phone" />
      <input name="currentLocation" />
      <input name="linkedin" />
      <input name="portfolio" />
      <input name="workAuthorization" />
      <input name="noticePeriod" />
      <input type="file" name="cv" />
      <textarea name="motivation"></textarea>
      <input type="checkbox" name="accuracyConsent" />
      <input type="checkbox" name="privacyConsent" />
    </form>
  </body>
</html>
